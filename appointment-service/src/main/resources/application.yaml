server:
  port: 8003

spring:
  application:
    name: appointment-service
  cloud:
    discovery:
      enabled: false
  datasource:
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/hospital_api_db?useSSL=false&serverTimezone=UTC
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/


# ddl-auto: update crea o actualiza las tablas automáticamente basándose en tus entidades